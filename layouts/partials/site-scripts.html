<script type="module">
  function installContentLightbox() {
    const targetSelector = [
      ".nested-copy-line-height img:not([data-no-lightbox])",
      ".nested-copy-line-height pre.mermaid svg"
    ].join(", ");

    const lightbox = document.createElement("div");
    lightbox.className = "content-lightbox";
    lightbox.hidden = true;
    lightbox.innerHTML = `
      <div class="content-lightbox__dialog"
           role="dialog"
           aria-modal="true"
           aria-label="이미지 확대 보기">
        <button type="button"
                class="content-lightbox__close"
                aria-label="확대 화면 닫기">&times;</button>
        <div class="content-lightbox__stage"></div>
      </div>
    `;

    document.body.appendChild(lightbox);

    const stage = lightbox.querySelector(".content-lightbox__stage");
    const closeButton = lightbox.querySelector(".content-lightbox__close");

    let lastFocusedElement = null;
    let activeObjectUrl = null;

    const clearStage = () => {
      if (activeObjectUrl) {
        URL.revokeObjectURL(activeObjectUrl);
        activeObjectUrl = null;
      }
      stage.replaceChildren();
    };

    const openLightbox = (source) => {
      clearStage();
      lastFocusedElement = document.activeElement;

      let media;

      if (source.tagName === "IMG") {
        media = document.createElement("img");
        media.src = source.currentSrc || source.src;
        media.alt = source.alt || "확대 이미지";
        media.decoding = "async";
      } else {
        const svgText = new XMLSerializer().serializeToString(source);
        activeObjectUrl = URL.createObjectURL(
          new Blob([svgText], { type: "image/svg+xml;charset=utf-8" })
        );

        media = document.createElement("img");
        media.src = activeObjectUrl;
        media.alt = "확대된 Mermaid 다이어그램";
        media.classList.add("content-lightbox__media--diagram");
      }

      media.classList.add("content-lightbox__media");
      stage.appendChild(media);

      lightbox.hidden = false;
      document.documentElement.classList.add("content-lightbox-open");
      closeButton.focus({ preventScroll: true });
    };

    const closeLightbox = () => {
      if (lightbox.hidden) return;

      lightbox.hidden = true;
      document.documentElement.classList.remove("content-lightbox-open");
      clearStage();

      if (lastFocusedElement instanceof HTMLElement) {
        lastFocusedElement.focus({ preventScroll: true });
      }
    };

    const refreshTargets = () => {
      document.querySelectorAll(targetSelector).forEach((target) => {
        if (!target.hasAttribute("tabindex")) {
          target.tabIndex = 0;
        }

        target.setAttribute("role", "button");

        if (!target.hasAttribute("aria-label")) {
          const altText =
            target.tagName === "IMG" ? target.getAttribute("alt")?.trim() : "";

          target.setAttribute(
            "aria-label",
            altText ? `${altText} - 크게 보기` : "이미지 크게 보기"
          );
        }
      });
    };

    document.addEventListener("click", (event) => {
      if (!(event.target instanceof Element)) return;

      const source = event.target.closest(targetSelector);
      if (!source) return;

      event.preventDefault();
      openLightbox(source);
    });

    document.addEventListener("keydown", (event) => {
      if (!lightbox.hidden) {
        if (event.key === "Escape") {
          event.preventDefault();
          closeLightbox();
        } else if (event.key === "Tab") {
          event.preventDefault();
          closeButton.focus();
        }
        return;
      }

      if (!(event.target instanceof Element)) return;

      const source = event.target.closest(targetSelector);
      if (!source) return;

      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        openLightbox(source);
      }
    });

    closeButton.addEventListener("click", closeLightbox);

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    refreshTargets();
    return refreshTargets;
  }

  window.addEventListener("load", async () => {
    const refreshLightboxTargets = installContentLightbox();
    const diagrams = document.querySelectorAll("pre.mermaid");

    if (diagrams.length > 0) {
      try {
        const { default: mermaid } = await import(
          "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs"
        );

        mermaid.initialize({
          startOnLoad: false,
          securityLevel: "strict",
          theme: "base",
          themeVariables: {
            darkMode: false,
            background: "#ffffff",
            textColor: "#111827",
            lineColor: "#1f2937",

            primaryColor: "#eff6ff",
            primaryTextColor: "#111827",
            primaryBorderColor: "#2563eb",

            secondaryColor: "#f0fdf4",
            tertiaryColor: "#fff7ed",

            clusterBkg: "#ffffff",
            clusterBorder: "#6b7280",
            edgeLabelBackground: "#ffffff",

            actorBkg: "#ffffff",
            actorBorder: "#374151",
            actorTextColor: "#111827",
            actorLineColor: "#4b5563",

            signalColor: "#1f2937",
            signalTextColor: "#111827",

            labelBoxBkgColor: "#ffffff",
            labelBoxBorderColor: "#6b7280",
            labelTextColor: "#111827",
            loopTextColor: "#111827",

            noteBkgColor: "#fffbea",
            noteBorderColor: "#ca8a04",
            noteTextColor: "#111827",

            activationBkgColor: "#dbeafe",
            activationBorderColor: "#2563eb"
          }
        });

        await mermaid.run({ nodes: diagrams });
      } catch (error) {
        console.error("Mermaid rendering failed:", error);
      }
    }

    refreshLightboxTargets();
  }, { once: true });
</script>
